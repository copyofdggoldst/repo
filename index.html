<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Python Clicking Game</title>
    
    <!-- Stable PyScript core engine dependencies -->
    <link rel="stylesheet" href="https://pyscript.net" />
    <script type="module" src="https://pyscript.net"></script>

    <!-- Structural CSS Layout Only (No Sprite Styling Here) -->
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0px;
            padding: 20px;
        }
        #game-area {
            width: 400px;
            height: 400px;
            background-color: #eed;
            border: 2px solid white;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <h2 id="game-title">Click the blue square!</h2>
    <p id="score-label">Score: <span id="score-text">0</span></p>

    <div id="game-area">
        <!-- The blue square lives inside here, visually constructed by Python -->
        <div id="sprite"></div>
    </div>

    <!-- 100% Pure Python Core & Sprite Setup -->
    <script type="py">
        import random
        from pyscript import web, when

        # Global score tracker
        score = 0

        # Grab the elements from the webpage
        sprite = web.page["#sprite"]
        score_text = web.page["#score-text"]

        # 1. SPRITE VISUAL DESIGN (Handled entirely by Python)
        sprite.update(style={
            "width": "50px",
            "height": "50px",
            "background-color": "#0066cc",
            "position": "absolute",
            "top": "175px",
            "left": "175px",
            "cursor": "pointer",
            "border-radius": "4px",
            "transition": "top 0.1s, left 0.1s"
        })

        # 2. GAME MECHANICS
        @when("click", "#sprite")
        def move_sprite(event):
            global score
            
            # Increment core game score via Python
            score += 1
            score_text.innerHTML = str(score)
            
            # Calculate new coordinates
            new_x = random.randint(0, 350)
            new_y = random.randint(0, 350)
            
            # Update the sprite's position dictionary
            sprite.update(style={
                "left": f"{new_x}px",
                "top": f"{new_y}px"
            })
    </script>

</body>
</html>
