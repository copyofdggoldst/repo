<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Python Clicking Game</title>
    
    <!-- Verified stable engine components -->
    <link rel="stylesheet" href="https://pyscript.net" />
    <script type="module" src="https://pyscript.net"></script>
</head>
<body>

    <h2 id="game-title">Click t!</h2>
    <p id="score-label">Score: <span id="score-text">0</span></p>

    <!-- Structural bones; Python completely creates, shapes, and handles the designs below -->
    <div id="game-area">
        <div id="sprite"></div>
    </div>

    <!-- 100% Pure Python Engine -->
    <script type="py">
        import random
        from js import document, window

        # 1. CORE GRAPHICS & VISUAL LAYER
        # Fetch element references directly via JavaScript context mapping
        body = document.body
        game_area = document.getElementById("game-area")
        sprite = document.getElementById("sprite")
        score_text = document.getElementById("score-text")

        # Style the main webpage canvas view
        body.style.backgroundColor = "#222"
        body.style.color = "white"
        body.style.fontFamily = "sans-serif"
        body.style.textAlign = "center"
        body.style.margin = "0px"
        body.style.padding = "20px"

        # Style the gray arena bounding container
        game_area.style.width = "400px"
        game_area.style.height = "400px"
        game_area.style.backgroundColor = "#eed"
        game_area.style.border = "2px solid white"
        game_area.style.margin = "20px auto"
        game_area.style.position = "relative"
        game_area.style.overflow = "hidden"

        # Style the interactive targets (the blue square sprite)
        sprite.style.width = "50px"
        sprite.style.height = "50px"
        sprite.style.backgroundColor = "#0066cc"
        sprite.style.position = "absolute"
        sprite.style.top = "175px"
        sprite.style.left = "175px"
        sprite.style.cursor = "pointer"
        sprite.style.borderRadius = "4px"
        sprite.style.transition = "top 0.1s, left 0.1s"


        # 2. INTERNAL MECHANICS ENGINE 
        score = 0

        def move_sprite(event):
            global score
            
            # Mechanical score increments managed by Python syntax
            score += 1
            score_text.innerText = str(score)
            
            # Boundary calculations
            new_x = random.randint(0, 350)
            new_y = random.randint(0, 350)
            
            # Map calculated integers safely to layout coordinates
            sprite.style.left = f"{new_x}px"
            sprite.style.top = f"{new_y}px"

        # Route interaction triggers via direct Python property assignment
        sprite.onclick = move_sprite
    </script>

</body>
</html>
