<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Python Clicking Game</title>
    
    <!-- Stable, verified PyScript engine links -->
    <link rel="stylesheet" href="https://pyscript.net" />
    <script type="module" src="https://pyscript.net"></script>
</head>
<body>

    <h2 id="game-title">Click the blue square!</h2>
    <p id="score-label">Score: <span id="score-text">0</span></p>

    <!-- Structural containers for PyScript to target -->
    <div id="game-area">
        <div id="sprite"></div>
    </div>

    <!-- 100% Pure Python Logic -->
    <script type="py">
        import random
        from pyscript import web, when

        # Global score tracker
        score = 0

        # Safely select DOM elements
        body = web.page.body
        game_area = web.page["#game-area"]
        sprite = web.page["#sprite"]
        score_text = web.page["#score-text"]

        # 1. APPLY VISUAL DESIGNS 
        # Using dictionary format to guarantee the browser renders the CSS safely
        body.update(style={
            "background-color": "#222",
            "color": "white",
            "font-family": "sans-serif",
            "text-align": "center",
            "margin": "0px",
            "padding": "20px"
        })

        game_area.update(style={
            "width": "400px",
            "height": "400px",
            "background-color": "#eed",
            "border": "2px solid white",
            "margin": "20px auto",
            "position": "relative",
            "overflow": "hidden"
        })

        sprite.update(style={
            "width": "50px",
            "height": "50px",
            "background-color": "#0066cc",
            "position": "absolute",
            "top": "175px",
            "left": "175px",
            "cursor": "pointer",
            "border-radius": "4px",
            "transition": "top 0.1s, left 0.1s"
        })


        # 2. GAME ACTION LOGIC
        # Idiomatic PyScript event handling via python decorators
        @when("click", "#sprite")
        def move_sprite(event):
            global score
            
            # Increment and update text
            score += 1
            score_text.innerHTML = str(score)
            
            # Random positioning logic 
            new_x = random.randint(0, 350)
            new_y = random.randint(0, 350)
            
            # Reposition the element securely
            sprite.update(style={
                "left": f"{new_x}px",
                "top": f"{new_y}px"
            })
    </script>

</body>
</html>
