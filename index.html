<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Python Clicking Game</title>
    
    <!-- Mandatory engine components required to process Python in the browser -->
    <link rel="stylesheet" href="https://pyscript.net" />
    <script type="module" src="https://pyscript.net"></script>
</head>
<body>

    <!-- Basic structural bones; all visuals are handled below by Python -->
    <h2 id="game-title">Click the blue square!</h2>
    <p id="score-label">Score: <span id="score-text">0</span></p>

    <div id="game-area">
        <div id="sprite" py-click="move_sprite"></div>
    </div>

    <!-- The complete design and logic written 100% in Python -->
    <script type="py">
        import random
        from pyscript import web

        # 1. VISUAL DESIGN SECTION (Python applying styles directly)
        # Style the main page body
        web.page.body.style["backgroundColor"] = "#222"
        web.page.body.style["color"] = "white"
        web.page.body.style["fontFamily"] = "sans-serif"
        web.page.body.style["textAlign"] = "center"
        web.page.body.style["margin"] = "0px"
        web.page.body.style["padding"] = "20px"

        # Style the gray game arena box
        game_area = web.page["#game-area"]
        game_area.style["width"] = "400px"
        game_area.style["height"] = "400px"
        game_area.style["backgroundColor"] = "#eed"
        game_area.style["border"] = "2px solid white"
        game_area.style["margin"] = "20px auto"
        game_area.style["position"] = "relative"
        game_area.style["overflow"] = "hidden"

        # Style the interactive target blue square
        sprite = web.page["#sprite"]
        sprite.style["width"] = "50px"
        sprite.style["height"] = "50px"
        sprite.style["backgroundColor"] = "#0066cc"
        sprite.style["position"] = "absolute"
        sprite.style["top"] = "175px"
        sprite.style["left"] = "175px"
        sprite.style["cursor"] = "pointer"
        sprite.style["borderRadius"] = "4px"
        sprite.style["transition"] = "top 0.1s, left 0.1s"


        # 2. GAME LOGIC SECTION (Action engine)
        score = 0

        def move_sprite(event):
            global score
            
            # Increment and update the score string
            score += 1
            web.page["#score-text"].html = str(score)
            
            # Compute new coordinates within the 400x400 boundary box
            new_x = random.randint(0, 350)
            new_y = random.randint(0, 350)
            
            # Teleport the sprite element using Python style updates
            sprite.style["left"] = f"{new_x}px"
            sprite.style["top"] = f"{new_y}px"
    </script>

</body>
</html>
